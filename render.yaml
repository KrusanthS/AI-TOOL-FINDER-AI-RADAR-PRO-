# Render Blueprint Specification
# Commit this file to your git repository, and you can deploy your entire stack
# as a SINGLE unified Web Service by selecting "Blueprint" in your Render dashboard.

services:
  - type: web
    name: ai-radar-pro
    env: node
    plan: free
    # Do not set rootDir so that Render runs commands from the repository root
    buildCommand: npm install --prefix backend && npm install --prefix frontend --production=false && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      # Backend Config
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENABLE_BACKGROUND_JOBS
        value: "false"
      - key: VALIDATE_GEMINI_ON_STARTUP
        value: "false"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random key
      - key: RATE_LIMIT_WINDOW
        value: "15"
      - key: RATE_LIMIT_MAX
        value: "1000"
      - key: ADMIN_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: PRODUCT_HUNT_API_KEY
        sync: false
      - key: PRODUCT_HUNT_API_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false

      # Frontend Config (Compiled into static assets during build)
      # Set these in the Render Dashboard > Environment tab
      - key: VITE_API_URL
        value: "/api"
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
